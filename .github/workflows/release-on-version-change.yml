name: Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - src/PrMonitor.csproj
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version and release conditions
        id: version
        shell: pwsh
        run: |
          function Normalize-XmlText([string]$text) {
            if ([string]::IsNullOrWhiteSpace($text)) {
              return $text
            }

            $normalized = $text.Trim()
            $xmlStart = $normalized.IndexOf('<')
            if ($xmlStart -gt 0) {
              $normalized = $normalized.Substring($xmlStart)
            }

            return $normalized
          }

          $projectContent = Normalize-XmlText (Get-Content -Path "src/PrMonitor.csproj" -Raw)
          [xml]$project = $projectContent
          $currentVersion = [string]$project.Project.PropertyGroup.Version

          if ([string]::IsNullOrWhiteSpace($currentVersion)) {
            throw "No <Version> found in src/PrMonitor.csproj"
          }

          $shouldRelease = $true

          if ("${{ github.event_name }}" -eq "push") {
            $beforeSha = "${{ github.event.before }}"
            if (-not [string]::IsNullOrWhiteSpace($beforeSha) -and $beforeSha -ne "0000000000000000000000000000000000000000") {
              $previousContentLines = git show "$beforeSha`:src/PrMonitor.csproj" 2>$null
              $previousContent = Normalize-XmlText ($previousContentLines -join "`n")
              if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($previousContent)) {
                [xml]$previousProject = $previousContent
                $previousVersion = [string]$previousProject.Project.PropertyGroup.Version
                if ($previousVersion -eq $currentVersion) {
                  $shouldRelease = $false
                }
              }
            }
          }

          git fetch --tags --force
          $tagName = "v$currentVersion"
          $tagMatch = git tag -l "$tagName"
          $tagExists = -not [string]::IsNullOrWhiteSpace(($tagMatch -join ""))

          "version=$currentVersion" >> $env:GITHUB_OUTPUT
          "tag=$tagName" >> $env:GITHUB_OUTPUT
          "should_release=$shouldRelease" >> $env:GITHUB_OUTPUT
          "tag_exists=$tagExists" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        if: ${{ steps.version.outputs.should_release == 'true' && steps.version.outputs.tag_exists != 'true' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish win-x64 build
        if: ${{ steps.version.outputs.should_release == 'true' && steps.version.outputs.tag_exists != 'true' }}
        shell: pwsh
        run: |
          dotnet publish .\src\PrMonitor.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=None -p:DebugSymbols=false

      - name: Create release archive
        if: ${{ steps.version.outputs.should_release == 'true' && steps.version.outputs.tag_exists != 'true' }}
        id: archive
        shell: pwsh
        run: |
          $publishPath = "src/bin/Release/net10.0-windows10.0.17763.0/win-x64/publish"
          $exePath = Join-Path $publishPath "PrMonitor.exe"
          if (-not (Test-Path $exePath)) {
            throw "Single-file executable not found at $exePath"
          }

          $archiveName = "PrMonitor-${{ steps.version.outputs.version }}-win-x64.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive -Path $exePath -DestinationPath $archivePath
          "path=$archivePath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        if: ${{ steps.version.outputs.should_release == 'true' && steps.version.outputs.tag_exists != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.archive.outputs.path }}
