name: CI Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\pr-monitor.slnx

      - name: Build
        run: dotnet build .\pr-monitor.slnx -c Release --no-restore

      - name: Test
        run: dotnet test .\tests\PrMonitor.Tests\PrMonitor.Tests.csproj -c Release --no-build -v minimal
